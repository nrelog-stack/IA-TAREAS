<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA-Tareas</title>

<style>
:root{
--green-main:#1E4E4F;
--green-soft:#A7C8C9;
--green-light:#E7F1F1;
--bg:#f5f7f7;
}

body{
margin:0;
font-family:Segoe UI, Arial, sans-serif;
background:var(--bg);
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:260px;
background:var(--green-soft);
display:flex;
flex-direction:column;
padding:20px;
box-shadow:4px 0 18px rgba(0,0,0,0.12);
}

.brand{
background:white;
border:2px solid var(--green-main);
border-radius:10px;
padding:12px;
text-align:center;
}

.brand img{
width:140px;
display:block;
margin:auto;
}

.brand-title{
margin-top:6px;
font-weight:600;
color:var(--green-main);
}

.menu{
margin-top:28px;
display:flex;
flex-direction:column;
gap:6px;
}

.menu button{
background:white;
border:none;
color:var(--green-main);
padding:12px 14px;
border-radius:8px;
font-size:15px;
cursor:pointer;
transition:.2s;
text-align:left;
}

.menu button:hover{
background:var(--green-light);
}

.menu button.active{
background:var(--green-main);
color:white;
font-weight:600;
}

.menu-divider{
height:1px;
background:rgba(30,78,79,0.35);
margin:14px 6px;
border-radius:2px;
}

.logo-bottom{
margin-top:auto;
display:flex;
justify-content:center;
padding-top:20px;
}

.logo-bottom img{
width:120px;
}

.main{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

.viewer{
flex:1;
background:white;
}

iframe{
width:100%;
height:100%;
border:1px solid #ccc;
background:transparent;
}
</style>
</head>

<body>

<div class="sidebar">

<div class="brand">
<a href="https://impulsoagil.com" target="_blank">
<img src="Logo-Impulso-Agil.png">
</a>
<div class="brand-title">IA-Tareas</div>
</div>

<div class="menu">
<button onclick="loadPanel('crear tarea','https://airtable.com/app2mz8mBElrg7tAw/paguY1ajBDExJ28Aq',this)">Crear tarea</button>

<button onclick="loadPanel('panel','https://airtable.com/app2mz8mBElrg7tAw/pagbBvzrtfBFL2VX0',this)">Panel</button>

<button onclick="loadPanel('relacion tareas','https://airtable.com/app2mz8mBElrg7tAw/pagbqY7aB4tvWfrXU',this)">Relación tareas</button>

<button onclick="loadPanel('dashboard','https://airtable.com/app2mz8mBElrg7tAw/pag5uF6teDS7matiM',this)">Dashboard</button>

<div class="menu-divider"></div>
<button id="customAppBtn" onclick="openCustomApp(this)">+ Añadir app al menú</button>
</div>

<div class="logo-bottom">
<img src="LOGO RSMG.PNG">
</div>

</div>

<div class="main">
<div id="viewer" class="viewer" style="width:100%;height:100%;">
<iframe id="appFrame" src="" style="width:100%;height:100%;border:none;"></iframe>
</div>
</div>

<script>
function loadPanel(title, url, el){
const frame = document.getElementById('appFrame');
if(frame) frame.src = url;

document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
if(el) el.classList.add('active');
}


function openCustomApp(btn){
const saved=JSON.parse(localStorage.getItem('menuCustomApp')||'null')

if(saved && saved.url){
loadPanel(saved.title||'Mi app', saved.url, btn)
return
}

const title=prompt('Nombre para el nuevo punto de menú:','Mi app')
if(!title) return

const url=prompt('URL de la app que quieres añadir en el menú:','https://')
if(!url) return

localStorage.setItem('menuCustomApp', JSON.stringify({title:title,url:url}))
btn.innerText=title
loadPanel(title,url,btn)
}

function hydrateCustomAppButton(){
const btn=document.getElementById('customAppBtn')
if(!btn) return
const saved=JSON.parse(localStorage.getItem('menuCustomApp')||'null')
if(saved && saved.title){
btn.innerText=saved.title
}
}

window.onload = function(){
hydrateCustomAppButton()

const firstButton = document.querySelector('.menu button');
if(firstButton) firstButton.click();
};
</script>

</body>
</html>
