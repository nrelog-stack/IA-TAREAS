<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA-Tareas</title>

<style>
:root{
--green-main:#1E4E4F;
--green-soft:#A7C8C9;
--green-light:#E7F1F1;
--bg:#f5f7f7;
}

body{
margin:0;
font-family:Segoe UI, Arial, sans-serif;
background:var(--bg);
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:260px;
background:var(--green-soft);
display:flex;
flex-direction:column;
padding:20px;
box-shadow:4px 0 18px rgba(0,0,0,0.12);
}

.brand{
background:white;
border:2px solid var(--green-main);
border-radius:10px;
padding:12px;
text-align:center;
}

.brand img{
width:140px;
display:block;
margin:auto;
}

.brand-title{
margin-top:6px;
font-weight:600;
color:var(--green-main);
}

.menu{
margin-top:28px;
display:flex;
flex-direction:column;
gap:6px;
}

.menu button{
background:white;
border:none;
color:var(--green-main);
padding:12px 14px;
border-radius:8px;
font-size:15px;
cursor:pointer;
transition:.2s;
text-align:left;
}

.menu button:hover{
background:var(--green-light);
}

.menu button.active{
background:var(--green-main);
color:white;
font-weight:600;
}

.menu-divider{
height:1px;
background:rgba(30,78,79,0.35);
margin:14px 6px;
border-radius:2px;
}

.logo-bottom{
margin-top:auto;
display:flex;
justify-content:center;
padding-top:20px;
}

.logo-bottom img{
width:120px;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
height:56px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid rgba(0,0,0,0.08);
}

.top-title{
font-weight:600;
color:var(--green-main);
font-size:18px;
}

.fullscreen-btn{
background:var(--green-main);
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.viewer{
flex:1;
background:white;
}

iframe{
width:100%;
height:100%;
border:1px solid #ccc;
background:transparent;
}
</style>
</head>

<body>

<div class="sidebar">

<div class="brand">
<a href="https://impulsoagil.com" target="_blank">
<img src="Logo-Impulso-Agil.png">
</a>
<div class="brand-title">IA-Tareas</div>
</div>

<div class="menu">

<button onclick="openForm()">Registro</button>

<button onclick="loadPanel('Panel','https://airtable.com/embed/app2mz8mBElrg7tAw/shrwpMALi26XrQvqo',this)">Panel</button>

<button onclick="loadPanel('Relación','https://airtable.com/embed/app2mz8mBElrg7tAw/shrN5bdVkVQADgXkw',this)">Relación</button>

<button onclick="loadPanel('Mural','https://airtable.com/embed/app2mz8mBElrg7tAw/shrr0qObPNv4oJ7o8',this)">Mural</button>

<button onclick="loadPanel('Informe','https://airtable.com/embed/app2mz8mBElrg7tAw/shrcQfpTks2PAVVfU',this)">Informe</button>

<button onclick="loadPanel('Un Vistazo','https://airtable.com/embed/app2mz8mBElrg7tAw/shridA7PIeFZjXSRy',this)">Un Vistazo</button>

<button onclick="loadPanel('Opción 1','https://example.com/opcion1',this)">Opción 1</button>

<button onclick="loadPanel('Opción 2','https://example.com/opcion2',this)">Opción 2</button>

<button onclick="loadPanel('Opción 3','https://example.com/opcion3',this)">Opción 3</button>

<button onclick="loadPanel('Opción 4','https://example.com/opcion4',this)">Opción 4</button>

<div class="menu-divider"></div>

<button onclick="loadPanel('Control Sanitario Total','https://airtable.com/embed/app2mz8mBElrg7tAw/shrhbGDxkaaeV2hvU',this)">
Control Sanitario Total
</button>

<button onclick="loadPanel('Control Sanitario Individual','https://airtable.com/embed/app2mz8mBElrg7tAw/shr3a6Scg7Rf7iHO3',this)">
Control Sanitario Individual
</button>

</div>

<div class="logo-bottom">
<img src="LOGO RSMG.PNG">
</div>

</div>

<div class="main">

<div class="topbar">
<div class="top-title" id="title">Panel</div>
<button class="fullscreen-btn" onclick="fullscreen()">Pantalla completa</button>
</div>

<div class="viewer">
<iframe id="frame"></iframe>
</div>


</div>

<script>

let registroWindow = null
let clickLock = false

function openForm(){

if(clickLock) return
clickLock = true
setTimeout(()=>clickLock=false,1000)

if(registroWindow && !registroWindow.closed){
registroWindow.focus()
}else{
registroWindow = window.open("https://airtable.com/app2mz8mBElrg7tAw/pagaMWuc8tkBX3BBe/form", "registroTarea")
}

}

function loadPanel(title,url,btn){

document.getElementById("frame").src=url
document.getElementById("title").innerText=title

localStorage.setItem("ultimaVista", JSON.stringify({title:title,url:url}))

document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"))
if(btn) btn.classList.add("active")

}

function fullscreen(){
let el=document.querySelector(".viewer")
if(!document.fullscreenElement){
el.requestFullscreen()
}else{
document.exitFullscreen()
}
}

window.onload=function(){

let vista=localStorage.getItem("ultimaVista")

if(vista){
let v=JSON.parse(vista)
document.getElementById("frame").src=v.url
document.getElementById("title").innerText=v.title
}else{
document.getElementById("frame").src="https://airtable.com/embed/app2mz8mBElrg7tAw/shrwpMALi26XrQvqo"
}

}

</script>

</body>
</html>
